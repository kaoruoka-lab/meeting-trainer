<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="会議英語Pro">
<title>会議英語トレーナー Pro</title>
<style>
:root {
  --bg:#ffffff;--bg2:#f5f5f0;--bg3:#eeede8;
  --text:#1a1a18;--text2:#6b6b68;
  --border:#d8d7d2;--border2:#e8e7e2;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-text:#085041;--green-dark:#0F6E56;
  --red:#e05a2b;--radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg2);color:var(--text);min-height:100vh}
.app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);margin:0 auto}
.header{padding:14px 16px 12px;border-bottom:0.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:20}
.header h1{font-size:15px;font-weight:600}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:11px;color:var(--text2)}
.api-dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.api-dot.ok{background:var(--green)}
.tabs{display:flex;border-bottom:0.5px solid var(--border2);position:sticky;top:49px;background:var(--bg);z-index:19}
.tab{flex:1;padding:11px 0;font-size:12px;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;user-select:none}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:600}
.screen{flex:1;overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

/* Setup */
.setup-wrap{padding:24px 16px;display:flex;flex-direction:column;gap:16px}
.setup-title{font-size:16px;font-weight:600}
.setup-desc{font-size:13px;color:var(--text2);line-height:1.7}
.setup-lbl{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.setup-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);font-size:13px;color:var(--text);font-family:monospace;outline:none}
.setup-input:focus{border-color:var(--green)}
.setup-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.setup-btn:active{background:var(--green-dark)}
.setup-note{font-size:11px;color:var(--text2);line-height:1.7;padding:10px 12px;background:var(--bg2);border-radius:var(--radius-sm)}

/* Quiz settings */
.quiz-settings{padding:16px;display:flex;flex-direction:column;gap:14px}
.setting-group{display:flex;flex-direction:column;gap:8px}
.setting-lbl{font-size:12px;color:var(--text2);font-weight:500}
.seg{display:flex;border:0.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.seg-btn{flex:1;padding:8px 4px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--text2);border:none;border-right:0.5px solid var(--border);font-family:inherit}
.seg-btn:last-child{border-right:none}
.seg-btn.active{background:var(--bg2);color:var(--text);font-weight:600}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.cat-opt{padding:8px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);font-size:11px;cursor:pointer;background:var(--bg);color:var(--text2);text-align:center;font-family:inherit}
.cat-opt.active{border-color:var(--green);background:var(--green-bg);color:var(--green-text);font-weight:600}
.start-btn{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--green);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.start-btn:active{background:var(--green-dark)}

/* Quiz */
.quiz-wrap{padding:14px;display:flex;flex-direction:column;gap:12px}
.progress-row{display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:3px;background:var(--border2);border-radius:2px}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width 0.3s}
.prog-txt{font-size:12px;color:var(--text2);white-space:nowrap}
.scene-row{display:flex;align-items:center;gap:6px}
.cat-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:var(--green-bg);color:var(--green-text);white-space:nowrap}
.scene-txt{font-size:11px;color:var(--text2)}
.no-txt{font-size:11px;color:var(--text2);margin-left:auto}
.q-card{background:var(--bg2);border-radius:var(--radius);padding:22px 18px;text-align:center;min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.jp-main{font-size:18px;font-weight:500;line-height:1.6}

/* Recording */
.rec-area{display:flex;flex-direction:column;align-items:center;gap:10px;padding:16px;background:var(--bg2);border-radius:var(--radius)}
.rec-status{font-size:13px;font-weight:500}
.rec-viz{display:flex;align-items:center;justify-content:center;gap:3px;height:36px}
.rec-bar{width:3px;min-height:4px;background:var(--border);border-radius:2px;transition:height 0.08s}
.rec-bar.active{background:var(--red)}
.cdown-wrap{font-size:32px;font-weight:600;color:var(--green);min-height:40px;display:flex;align-items:center;justify-content:center}
.cdown-wrap.urgent{color:var(--red)}
.silence-bar-wrap{width:100%;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.silence-bar{height:100%;background:var(--green);border-radius:2px;transition:width 0.1s linear;width:0%}

/* Answer */
.ans-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px}
.en-main{font-size:16px;font-weight:600;color:var(--green-dark);line-height:1.5}
.note-box{font-size:12px;color:var(--text2);padding:7px 10px;background:var(--bg2);border-radius:var(--radius-sm)}

/* Score */
.score-card{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:12px}
.score-header{display:flex;align-items:center;justify-content:space-between}
.score-title{font-size:13px;font-weight:600}
.score-right{display:flex;align-items:center;gap:8px}
.score-stars{display:flex;gap:2px;font-size:17px}
.score-num{font-size:22px;font-weight:700;color:var(--green)}
.score-divider{height:0.5px;background:var(--border2)}
.score-section{display:flex;flex-direction:column;gap:5px}
.score-sec-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:0.04em}
.score-text{font-size:13px;line-height:1.6}
.score-item{font-size:13px;line-height:1.6;padding-left:12px;position:relative}
.score-item::before{content:'•';position:absolute;left:0;color:var(--green)}
.user-said{font-size:12px;color:var(--text2);font-style:italic;padding:6px 10px;background:var(--bg2);border-radius:var(--radius-sm)}
.analyzing{display:flex;align-items:center;gap:10px;padding:16px;font-size:13px;color:var(--text2)}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Result */
.mastery-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2)}
.dots{display:flex;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--green)}
.result-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-ng{padding:13px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:14px;cursor:pointer;font-weight:500;font-family:inherit}
.btn-ok{padding:13px;border-radius:var(--radius-sm);border:0.5px solid var(--green);background:var(--green-bg);color:var(--green-text);font-size:14px;cursor:pointer;font-weight:600;font-family:inherit}
.btn-ng:active{background:var(--bg3)}
.btn-ok:active{background:#c5eddf}

/* Summary */
.summary{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.big-num{font-size:56px;font-weight:600;color:var(--green)}
.big-sub{font-size:14px;color:var(--text2)}
.sum-btns{display:flex;flex-direction:column;gap:8px;width:100%;max-width:240px}
.restart-btn{padding:12px 20px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}

/* List */
.list-top{padding:12px 14px;display:flex;flex-direction:column;gap:10px;border-bottom:0.5px solid var(--border2);position:sticky;top:82px;background:var(--bg);z-index:10}
.search-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);font-size:14px;color:var(--text);font-family:inherit;outline:none}
.search-input:focus{border-color:var(--green)}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 12px;border-radius:20px;border:0.5px solid var(--border);font-size:11px;cursor:pointer;background:var(--bg);color:var(--text2);white-space:nowrap;font-family:inherit}
.chip.active{border-color:var(--text);color:var(--text);font-weight:600}
.list-count{font-size:12px;color:var(--text2);padding:8px 14px 4px}
.phrase-list{padding:8px 14px 20px;display:flex;flex-direction:column;gap:7px}
.p-item{padding:12px;border-radius:var(--radius-sm);border:0.5px solid var(--border2);cursor:pointer;display:flex;flex-direction:column;gap:5px}
.p-item:active{background:var(--bg2)}
.p-jp{font-size:13px;font-weight:500;line-height:1.4}
.p-en{font-size:12px;color:var(--green-dark);line-height:1.4}
.p-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.p-scene{font-size:10px;color:var(--text2)}
.p-dots{display:flex;gap:3px;margin-left:auto}
.p-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.p-dot.on{background:var(--green)}

/* Stats */
.stats-wrap{padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:40px}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.stat-card{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-val{font-size:28px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px}
.section-head{font-size:13px;font-weight:600;padding:4px 0 2px}
.cat-block{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 14px}
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--border2)}
.cat-row:last-child{border-bottom:none;padding-bottom:0}
.cat-row:first-child{padding-top:0}
.cat-name{font-size:11px;min-width:88px;color:var(--text2)}
.bar-wrap{flex:1;height:4px;background:var(--border2);border-radius:2px}
.bar-fill{height:100%;background:var(--green);border-radius:2px}
.cat-pct{font-size:11px;color:var(--text2);min-width:30px;text-align:right}
.sub-btn{align-self:center;padding:8px 16px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;font-family:inherit}
.again-btn{width:100%;padding:11px;border-radius:var(--radius-sm);border:0.5px solid var(--blue,#0C6FC4);background:#E6F1FB;color:#0C447C;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.again-btn:active{background:#cce3f7}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;transition:border-color 0.2s}
.upload-area:hover{border-color:var(--green)}
.upload-area input{display:none}
.upload-note{font-size:11px;color:var(--text2);line-height:1.7;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-sm)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎙 会議英語トレーナー Pro</h1>
    <div class="hdr-right">
      <div class="api-dot" id="api-dot"></div>
      <span class="hdr-sub" id="hdr-ct"></span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="sw('quiz')">練習</div>
    <div class="tab" onclick="sw('list')">一覧</div>
    <div class="tab" onclick="sw('stats')">習熟度</div>
  </div>
  <div id="quiz" class="screen active"><div id="quiz-body"></div></div>
  <div id="list" class="screen">
    <div class="list-top">
      <input class="search-input" id="search" placeholder="フレーズを検索..." oninput="renderList()">
      <div class="filter-row" id="filter-row"></div>
    </div>
    <div class="list-count" id="list-count"></div>
    <div class="phrase-list" id="phrase-list"></div>
  </div>
  <div id="stats" class="screen"><div class="stats-wrap" id="stats-body"></div></div>
</div>

<script>
const PH=[
{id:1,cat:"会議開始",scene:"音声確認",jp:"聞こえていますでしょうか。",en:"Can you hear me clearly?",note:"オンラインMTG冒頭"},
{id:2,cat:"会議開始",scene:"音声確認",jp:"私の声は問題なく聞こえていますか。",en:"Is my audio okay?",note:"カジュアルに使える"},
{id:3,cat:"会議開始",scene:"音声確認",jp:"画面は見えていますか。",en:"Can you see my screen?",note:"画面共有時"},
{id:4,cat:"会議開始",scene:"参加トラブル",jp:"すみません、入るのに少し手間取りました。",en:"Sorry, I had a little trouble joining.",note:"入室が遅れた時"},
{id:5,cat:"会議開始",scene:"開始挨拶",jp:"本日はお時間をいただきありがとうございます。",en:"Thank you for your time today.",note:"社外にも使える"},
{id:6,cat:"会議開始",scene:"開始挨拶",jp:"本日はご参加ありがとうございます。",en:"Thanks for joining today.",note:"自分が主催したMTG"},

{id:8,cat:"会議開始",scene:"開始挨拶",jp:"この会議を設定していただきありがとうございます。",en:"Thank you for setting this up.",note:"相手が会議設定した場合"},
{id:9,cat:"会議開始",scene:"自己紹介",jp:"簡単に自己紹介させてください。",en:"Let me briefly introduce myself.",note:"初回MTG"},
{id:10,cat:"会議開始",scene:"自己紹介",jp:"Kaoru Okaです。Kaoruと呼んでください。",en:"My name is Kaoru Oka. Please call me Kaoru.",note:"初回MTGで自然"},
{id:11,cat:"会議開始",scene:"役割説明",jp:"私は日本語ローカリゼーションとレビュー調整を担当しています。",en:"I'm responsible for Japanese localization and review coordination.",note:""},
{id:12,cat:"会議開始",scene:"役割説明",jp:"私は英日ローカリゼーションの進行管理を担当しています。",en:"I manage the English-to-Japanese localization workflow.",note:""},
{id:13,cat:"会議開始",scene:"役割説明",jp:"主にスケジュール調整とベンダー対応を担当しています。",en:"I mainly handle schedule coordination and vendor communication.",note:""},
{id:14,cat:"会議開始",scene:"役割説明",jp:"ローカリゼーションPMと顧客対応の経験があります。",en:"I have experience in localization project management and client communication.",note:""},
{id:15,cat:"会議開始",scene:"目的確認",jp:"本日の目的は、翻訳範囲とスケジュールの認識を合わせることです。",en:"The purpose of today's meeting is to align on the translation scope and schedule.",note:""},
{id:16,cat:"会議開始",scene:"目的確認",jp:"今日は進捗を確認し、懸念点について話し合いたいと思います。",en:"Today, I'd like to go over the progress and discuss any concerns.",note:""},
{id:17,cat:"会議開始",scene:"アジェンダ共有",jp:"まず進捗を確認して、その後で未解決の質問について話しましょう。",en:"Let's first go over the progress, and then discuss the open questions.",note:""},
{id:18,cat:"会議開始",scene:"アジェンダ共有",jp:"簡潔にお話しします。",en:"I'll keep it brief.",note:""},
{id:19,cat:"聞き返し・確認",scene:"聞き返し",jp:"すみません、もう一度言っていただけますか。",en:"Sorry, could you say that again?",note:"最重要"},
{id:20,cat:"聞き返し・確認",scene:"聞き返し",jp:"質問をもう一度お願いできますか。",en:"Could you repeat the question?",note:""},

{id:24,cat:"聞き返し・確認",scene:"言い換え依頼",jp:"別の言い方で説明していただけますか。",en:"Could you rephrase that?",note:""},
{id:25,cat:"聞き返し・確認",scene:"背景確認",jp:"もう少し背景を教えていただけますか。",en:"Could you give me a little more context?",note:"万能"},
{id:26,cat:"聞き返し・確認",scene:"理解確認",jp:"正しく理解できているか確認させてください。",en:"Let me make sure I understood correctly.",note:"かなり使う"},
{id:27,cat:"聞き返し・確認",scene:"理解確認",jp:"私の理解を確認させてください。",en:"Let me confirm my understanding.",note:""},

{id:30,cat:"聞き返し・確認",scene:"例示依頼",jp:"例を挙げていただけますか。",en:"Could you give me an example?",note:""},

{id:35,cat:"進捗確認・報告",scene:"期限確認",jp:"締切にはまだ間に合いそうですか。",en:"Are we still on track for the deadline?",note:""},
{id:36,cat:"進捗確認・報告",scene:"完了率確認",jp:"レビューはどのくらい進んでいますか。",en:"How far along is the review?",note:""},
{id:37,cat:"進捗確認・報告",scene:"ブロッカー確認",jp:"何か進行を止めているものはありますか。",en:"Is anything blocking your progress?",note:""},
{id:38,cat:"進捗確認・報告",scene:"問題確認",jp:"現時点で何か問題はありますか。",en:"Are there any issues at this point?",note:""},
{id:39,cat:"進捗確認・報告",scene:"遅延確認",jp:"遅れている理由を教えていただけますか。",en:"Could you explain what caused the delay?",note:""},
{id:40,cat:"進捗確認・報告",scene:"優先度確認",jp:"どのタスクを優先すべきでしょうか。",en:"Which task should we prioritize?",note:""},
{id:41,cat:"進捗確認・報告",scene:"支援確認",jp:"追加サポートは必要そうですか。",en:"Do we need any additional support?",note:""},

function loadData(){
  try{
    const k=localStorage.getItem('mtg_apikey2');
    if(k){apiKey=k;updateApiDot();}
    const m=localStorage.getItem('mtg_mastery4');
    if(m)mastery=JSON.parse(m);
  }catch(e){}
}
function saveKey(k){try{localStorage.setItem('mtg_apikey2',k);}catch(e){}}
function saveM(){try{localStorage.setItem('mtg_mastery4',JSON.stringify(mastery));}catch(e){}}
function gm(id){return mastery[id]||0;}
function sm(id,v){mastery[id]=Math.max(0,Math.min(5,v));saveM();}
function updateApiDot(){
  const d=document.getElementById('api-dot');
  if(d)d.className='api-dot'+(apiKey?' ok':'');
}

function sw(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['quiz','list','stats'][i]===t));
  document.querySelectorAll('.screen').forEach(el=>el.classList.toggle('active',el.id===t));
  if(t==='list')renderList();
  if(t==='stats')renderStats();
}

function dots(m){
  return Array.from({length:5},(_,i)=>`<div class="dot${i<m?' on':''}"></div>`).join('');
}

/* ===== SETUP ===== */
function renderSetup(){
  stopAll();
  document.getElementById('quiz-body').innerHTML=`
  <div class="setup-wrap">
    <div class="setup-title">🔑 APIキー設定</div>
    <div class="setup-desc">初回のみ入力してください。次回からは自動的に読み込まれます。</div>
    <div>
      <div class="setup-lbl">Anthropic APIキー（sk-ant-...）</div>
      <input class="setup-input" id="key-input" type="password" placeholder="sk-ant-api03-..." autocomplete="off">
    </div>
    <button class="setup-btn" onclick="saveApiKey()">保存して開始</button>
    <div class="setup-note">⚠️ キーはこのデバイスにのみ保存されます。<br>取得先: console.anthropic.com → API Keys</div>
  </div>`;
}

function saveApiKey(){
  const k=(document.getElementById('key-input').value||'').trim();
  if(!k.startsWith('sk-ant-')){alert('APIキーは sk-ant- で始まる必要があります');return;}
  apiKey=k;
  saveKey(k);
  updateApiDot();
  renderQuizSettings();
}

function buildQueue(){
  let pool=[...PH];
  if(filterCat!=='すべて')pool=pool.filter(p=>p.cat===filterCat);
  if(settings.order==='smart'){
    pool.sort((a,b)=>{const d=gm(a.id)-gm(b.id);return d!==0?d:Math.random()-0.5;});
  }else{
    pool.sort(()=>Math.random()-0.5);
  }
  return pool.slice(0,Math.min(settings.count,pool.length));
}

function startQuiz(){
  qs={queue:buildQueue(),idx:0,ok:0,total:0,done:false};
  renderQuestion();
}

/* ===== RECORDING ===== */
async function startAutoRecording(q){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioContext.createAnalyser();
    analyser.fftSize=256;
    const src=audioContext.createMediaStreamSource(micStream);
    src.connect(analyser);
    audioChunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    mediaRecorder=new MediaRecorder(micStream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>runSTT(q);
    mediaRecorder.start(100);
    isRecording=true;
    speechDetected=false;
    // 録音と同時にSTTも起動（話し始めを取りこぼさないため）
    startSTT();
    setStatus('待機中 — 話してください 🎤',false);
    startCountdown();
    startViz();
  }catch(e){
    setStatus('マイクにアクセスできません',false);
    setTimeout(()=>showAnswerOnly(q),1500);
  }
}

function startCountdown(){
  let t=settings.wait;
  setCdown(t,false);
  noSpeechTimer=setInterval(()=>{
    if(speechDetected){clearInterval(noSpeechTimer);setCdown('',false);return;}
    t--;
    setCdown(t,t<=2);
    if(t<=0){
      clearInterval(noSpeechTimer);
      stopAll();
      showAnswerOnly(qs.queue[qs.idx]);
    }
  },1000);
}

function setCdown(val,urgent){
  const el=document.getElementById('cdown-wrap');
  if(el){el.textContent=val===''?'':val;el.className='cdown-wrap'+(urgent?' urgent':'');}
}

function setStatus(txt,rec){
  const el=document.getElementById('rec-status');
  if(el){el.textContent=txt;el.style.color=rec?'var(--red)':'var(--text2)';}
}

function startViz(){
  const buf=new Uint8Array(analyser.frequencyBinCount);
  let silenceTicks=0;
  const maxSilenceTicks=Math.round(SILENCE_STOP_MS/SILENCE_TICK);
  function tick(){
    if(!isRecording){cancelAnimationFrame(vizRaf);return;}
    analyser.getByteFrequencyData(buf);
    const avg=buf.reduce((s,v)=>s+v,0)/buf.length;
    const bars=document.querySelectorAll('.rec-bar');
    bars.forEach((bar,i)=>{
      bar.style.height=Math.max(4,Math.min(30,buf[i*2]/5))+'px';
      bar.classList.toggle('active',avg>SILENCE_THRESHOLD);
    });
    if(!speechDetected){
      if(avg>SILENCE_THRESHOLD){
        speechDetected=true;
        clearInterval(noSpeechTimer);
        setCdown('',false);
        setStatus('録音中... 🔴',true);
        silenceTicks=0;
      }
    } else {
      if(avg<SILENCE_THRESHOLD){
        silenceTicks++;
        const sb=document.getElementById('silence-bar');
        if(sb)sb.style.width=Math.min(100,silenceTicks/maxSilenceTicks*100)+'%';
        if(silenceTicks>=maxSilenceTicks){stopAll();return;}
      } else {
        silenceTicks=0;
        const sb=document.getElementById('silence-bar');
        if(sb)sb.style.width='0%';
      }
    }
    vizRaf=requestAnimationFrame(tick);
  }
  vizRaf=requestAnimationFrame(tick);
}

function stopAll(){
  isRecording=false;
  clearInterval(noSpeechTimer);
  cancelAnimationFrame(vizRaf);
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(audioContext&&audioContext.state!=='closed')audioContext.close();
}

/* ===== STT + RECORDING（PC Chrome専用・continuous mode）===== */
let srInstance=null;
let srTranscript='';
let sttCallback=null; // STT停止後に呼ぶコールバック

function startSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  srTranscript='';
  sttCallback=null;
  srInstance=new SR();
  srInstance.lang='en-US';
  srInstance.continuous=true;
  srInstance.interimResults=false;
  srInstance.maxAlternatives=1;
  srInstance.onresult=e=>{
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){
        srTranscript+=(srTranscript?' ':'')+e.results[i][0].transcript.trim();
      }
    }
  };
  srInstance.onerror=e=>{
    if(e.error==='no-speech')return;
  };
  srInstance.onend=()=>{
    if(sttCallback){
      // 停止要求があったのでコールバック実行
      const cb=sttCallback;
      sttCallback=null;
      cb(srTranscript.trim());
    } else if(isRecording){
      // 録音中に勝手に止まったら再起動
      try{srInstance.start();}catch(e){}
    }
  };
  try{srInstance.start();}catch(e){}
}

function stopSTT(){
  if(srInstance){
    srInstance.onend=()=>{};
    try{srInstance.stop();}catch(e){}
    srInstance=null;
  }
}

function runSTT(q){
  if(!speechDetected){return;}
  const recArea=document.getElementById('rec-area');
  if(recArea)recArea.innerHTML='<div class="analyzing"><div class="spinner"></div>AIが分析中...</div>';

  // STTにコールバックをセットしてから停止
  // onendが発火した時点でtranscriptが確定している
  let done=false;
  const handleTranscript=(transcript)=>{
    if(done)return;
    done=true;
    if(transcript){
      analyzeText(transcript,q);
    } else {
      showAnswerOnly(q);
    }
  };

  if(srInstance){
    sttCallback=handleTranscript;
    try{srInstance.stop();}catch(e){
      // stop失敗時はフォールバック
      setTimeout(()=>handleTranscript(srTranscript.trim()),600);
    }
  } else {
    handleTranscript(srTranscript.trim());
  }

  // タイムアウト保険（3秒）
  setTimeout(()=>handleTranscript(srTranscript.trim()),3000);
}

async function analyzeText(transcript,q){
  const prompt=buildPrompt(q,transcript);
  try{
    const result=await callClaude([{role:'user',content:prompt}]);
    showScore(result,q);
  }catch(e){showAnswerOnly(q);}
}

function buildPrompt(q,transcript){
  return `あなたは厳格なビジネス英語コーチです。日本語ネイティブが海外顧客・海外上長との英語会議で通用するレベルを目指しています。

【お題の日本語】: 「${q.jp}」
【参考正解例】: 「${q.en}」
【ユーザーが実際に言った英語】: 「${transcript}」

【採点の基本方針】
- 採点は「参考正解例との一致度」ではなく「日本語の意味を正しく英語で伝えられているか」で行う
- 参考正解例と違う表現でも、意味が正確でビジネス英語として自然であれば高得点
- 参考正解例と同じ内容を別の自然な言い方で言えた場合は「✅ 別の良い表現です」とfixesに入れず褒める

【採点基準（1〜5の整数）】
5点: 日本語の意味を完全に正確に伝えており、ビジネス英語として自然。発音・表現ともに申し分ない
4点: 意味は正しく伝わるが、表現が少し不自然・簡略・または発音に軽微な問題あり
3点: 意味はだいたい合っているが、ニュアンスがズレている、または重要な単語が抜けている
2点: 意味が少し違う、または聞き手が理解に苦労するレベル
1点❌: 意味が全く違う、または英語として理解不能

【減点ルール】
- 意味が変わる単語の脱落・言い間違い → 大きく減点
- ニュアンスが少しズレる程度 → 小さく減点
- 発音の問題（th/r/l/v/f の日本語訛り）→ 指摘するが意味が通じれば大きく減点しない
- 文法的に間違っているが意味が通じる → 指摘して小さく減点

以下のJSON形式のみで返してください（前後に余計なテキスト不要）:
{
  "transcribed": "${transcript}",
  "score": 3,
  "meaning_check": "日本語の意味と合っているかの判定（「正確」「ほぼ正確」「ズレあり」「大きくズレ」のいずれか）",
  "good": "良かった点を日本語で1文（本当に良い点のみ、厳しく）",
  "fixes": ["改善点1（具体的に）", "改善点2（あれば）", "改善点3（あれば）"],
  "tip": "最優先で直すべき点を日本語で1文（短く）"
}`;
}

async function callClaude(messages){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:700,messages})
  });
  if(!res.ok)throw new Error('API '+res.status);
  const data=await res.json();
  const text=data.content.map(c=>c.text||'').join('');
  const clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

  const meaningColor={
    '正確':'#085041','ほぼ正確':'#085041','ズレあり':'#633806','大きくズレ':'#b91c1c'
  }[result.meaning_check]||'var(--text2)';
  const meaningBg={
    '正確':'#E1F5EE','ほぼ正確':'#E1F5EE','ズレあり':'#FAEEDA','大きくズレ':'#fdeee7'

      <div class="score-divider"></div>
      ${result.good?`<div class="score-section"><div class="score-sec-title">✅ 良かった点</div><div class="score-text">${result.good}</div></div>`:''}

function retryQuestion(){
  const q=qs.queue[qs.idx];
  // 録音だけ止める。STTは止めない
  isRecording=false;
  clearInterval(noSpeechTimer);
  cancelAnimationFrame(vizRaf);
  if(mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.onstop=()=>{};
    mediaRecorder.stop();
  }
  if(micStream)micStream.getTracks().forEach(t=>t.stop());
  if(audioContext&&audioContext.state!=='closed')audioContext.close();

  // トランスクリプトとコールバックだけリセット
  srTranscript='';
  sttCallback=null;

  const ansArea=document.getElementById('ans-area');
  const resultArea=document.getElementById('result-area');
  if(ansArea)ansArea.innerHTML='';
  if(resultArea)resultArea.innerHTML='';

  const quizWrap=document.querySelector('.quiz-wrap');
  if(quizWrap){
    let recArea=document.getElementById('rec-area');
    if(!recArea){
      recArea=document.createElement('div');
      recArea.id='rec-area';
      recArea.className='rec-area';
      quizWrap.insertBefore(recArea,quizWrap.lastElementChild);
    }
    recArea.style.display='';
    recArea.innerHTML=`
      <div class="rec-status" id="rec-status">待機中 — 話してください 🎤</div>
      <div class="rec-viz" id="rec-viz">${Array.from({length:14},()=>'<div class="rec-bar"></div>').join('')}</div>
      <div class="cdown-wrap" id="cdown-wrap">&nbsp;</div>
      <div class="silence-bar-wrap"><div class="silence-bar" id="silence-bar"></div></div>`;
  }

  // 録音だけ再開（STTはそのまま継続）
  startRecordingOnly(q);
}

async function startRecordingOnly(q){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true}});
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioContext.createAnalyser();
    analyser.fftSize=256;
    const src=audioContext.createMediaStreamSource(micStream);
    src.connect(analyser);
    audioChunks=[];
    const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    mediaRecorder=new MediaRecorder(micStream,{mimeType});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRecorder.onstop=()=>runSTT(q);
    mediaRecorder.start(100);
    isRecording=true;
    speechDetected=false;
    startCountdown();
    startViz();
  }catch(e){
    setStatus('マイクにアクセスできません',false);
    setTimeout(()=>showAnswerOnly(q),1500);
  }
}

function mark(ok){
  const q=qs.queue[qs.idx];
  if(ok){sm(q.id,gm(q.id)+1);qs.ok++;}
  else{sm(q.id,Math.max(0,gm(q.id)-1));}
  qs.total++;qs.idx++;
  if(qs.idx>=qs.queue.length)qs.done=true;
  renderQuestion();
}

    <button class="sub-btn" onclick="if(confirm('APIキーを変更しますか？')){apiKey='';localStorage.removeItem('mtg_apikey2');updateApiDot();sw('quiz');renderSetup();}">🔑 APIキーを変更</button>
    <div class="section-head">フレーズデータの入れ替え</div>
    <div class="upload-area" onclick="document.getElementById('csv-input').click()">
      📁 CSVファイルをタップして読み込む<br>
      <small>（No./カテゴリ/シーン/日本語/英語/メモ の形式）</small>
      <input type="file" id="csv-input" accept=".csv" onchange="loadCSV(event)">
    </div>
    <div class="upload-note">
      CSVの列順: No. / カテゴリ / シーン / 日本語 / 英語 / メモ<br>
      読み込むと現在のフレーズが置き換わります。<br>
      デフォルトに戻す場合はページをリロードしてください。
    </div>`;
}

/* ===== CSV UPLOAD ===== */
function loadCSV(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split('\n').filter(l=>l.trim());
      const newPhrases=[];
      // ヘッダー行をスキップ（1行目がNoや番号で始まる場合）
      const start=isNaN(parseInt(lines[0].split(',')[0]))?1:0;
      lines.slice(start).forEach((line,idx)=>{
        const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
        if(cols.length>=5&&cols[3]&&cols[4]){
          newPhrases.push({
            id:parseInt(cols[0])||idx+1,
            cat:cols[1]||'その他',
            scene:cols[2]||'',
            jp:cols[3],
            en:cols[4],
            note:cols[5]||''
          });
        }
      });
      if(newPhrases.length===0){alert('フレーズが読み込めませんでした。CSVの形式を確認してください。');return;}
      // グローバルのPHを置き換え
      PH.length=0;
      newPhrases.forEach(p=>PH.push(p));
      // CATSも更新
      CATS.length=0;
      CATS.push('すべて');
      [...new Set(PH.map(p=>p.cat))].forEach(c=>CATS.push(c));
      document.getElementById('hdr-ct').textContent=PH.length+' フレーズ';
      alert(`✅ ${PH.length}件のフレーズを読み込みました！`);
      renderStats();
    }catch(err){
      alert('読み込みエラー: '+err.message);
    }
  };
  reader.readAsText(file,'UTF-8');
}

/* ===== INIT ===== */
loadData();
document.getElementById('hdr-ct').textContent=PH.length+' フレーズ';
if(apiKey){renderQuizSettings();}else{renderSetup();}
</script>
</body>
